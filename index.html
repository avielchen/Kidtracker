<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="KidTracker"/>
<meta name="theme-color" content="#0ea5e9"/>
<title>KidTracker — Today</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="shared.css"/>
<script type="module" src="firebase-loader.js"></script>
<script src="shared.js"></script>
<style>
.date-bar-wrap{background:var(--card);border-bottom:1px solid var(--border)}
.date-bar{display:flex;align-items:center;justify-content:center;gap:10px;padding:7px 16px;max-width:var(--max-w);margin:0 auto}
.date-bar-text{font-weight:800;font-size:.9rem;color:#374151;min-width:180px;text-align:center}
.date-nav-btn{background:none;border:1.5px solid var(--border);border-radius:8px;width:28px;height:28px;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;color:var(--text);flex-shrink:0;transition:background .15s}
.date-nav-btn:hover{background:#f1f5f9}
.cards{display:flex;flex-direction:column;gap:10px}
.kid-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.card-top{display:flex;align-items:center;gap:10px;padding:10px 13px 8px;transition:background .3s}
.kid-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#f0f4f8;flex-shrink:0;font-size:1.4rem;overflow:hidden}
.kid-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.kid-name-txt{font-weight:900;font-size:.95rem;line-height:1}
.kid-meta{font-size:.59rem;color:#b0bec5;font-weight:600;margin-top:2px}
.status-badge{font-size:.82rem;font-weight:900;padding:5px 11px;border-radius:20px;background:var(--border);color:var(--muted);white-space:nowrap;flex-shrink:0;transition:all .25s}
.stbar{display:flex;align-items:center;gap:5px;padding:5px 13px;border-top:1px solid var(--border);background:#f8fafc;font-size:.7rem;font-weight:700;color:var(--muted)}
.stbar .stl{flex:1}.stbar .stv{font-weight:800;color:var(--text)}
.stbar.noschool{background:#fff7ed;color:#c2410c}.stbar.noschool .stv{color:#c2410c}
.stbar.halfday{background:#f0fdf4;color:#15803d}.stbar.halfday .stv{color:#15803d}
.etime-btn{background:none;border:none;cursor:pointer;font-size:.68rem;color:var(--muted);padding:1px 3px}
.etime-btn:hover{color:var(--blue)}
.etime-inp{border:1.5px solid var(--blue);border-radius:6px;padding:1px 5px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.7rem;color:var(--text);outline:none;width:75px;display:none}
.card-cols{display:grid;grid-template-columns:1fr 1fr 1fr;border-top:1px solid var(--border)}
.card-col{padding:8px 9px 10px}
.card-col:not(:last-child){border-right:1px solid var(--border)}
.col-lbl{font-size:.55rem;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:5px}
.chips{display:flex;flex-wrap:wrap;gap:3px}
.chip{display:inline-flex;align-items:center;gap:2px;padding:3px 8px;border-radius:20px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.65rem;cursor:pointer;border:1.5px solid transparent;background:#f1f5f9;color:var(--muted);transition:all .12s;white-space:nowrap;user-select:none}
.chip:hover{filter:brightness(.93);transform:translateY(-1px)}
.chip:active{transform:scale(.95)}
.status-note{display:none;margin-top:5px}
.status-note.visible{display:block}
.status-note input{width:100%;border:1.5px solid var(--border);border-radius:7px;padding:4px 8px;font-family:'Nunito',sans-serif;font-size:.68rem;font-weight:600;color:var(--text);background:#f8fafc;outline:none}
.status-note input::placeholder{color:#c0ccd8}
.time-row{display:inline-flex;align-items:center;gap:3px;margin-top:5px;background:#f8fafc;border:1.5px solid var(--border);border-radius:7px;padding:3px 7px}
.time-row span{font-size:.65rem;color:var(--muted)}
.time-row input[type=time]{border:none;background:transparent;font-family:'Nunito',sans-serif;font-weight:700;font-size:.68rem;color:var(--text);outline:none;cursor:pointer}
.time-row.soon{border-color:#fb923c;background:#fff7ed}
.time-row.soon span,.time-row.soon input{color:#c2410c}
.dnbox{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:10px 13px;margin-top:10px}
.dnbox textarea{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:6px 10px;font-family:'Nunito',sans-serif;font-size:.78rem;font-weight:600;color:var(--text);background:#f8fafc;outline:none;resize:none;min-height:48px}
.dnbox textarea::placeholder{color:#c0ccd8}
.confirm-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--red);color:#fff;padding:9px 16px;border-radius:12px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.78rem;box-shadow:0 4px 20px rgba(220,38,38,.4);z-index:400;display:none;text-align:center;max-width:300px;cursor:pointer}
.confirm-toast.visible{display:block;animation:tIn .2s ease}
@keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
#no-school-banner{display:none;background:#fff7ed;border:1.5px solid #fb923c;border-radius:10px;padding:7px 12px;font-size:.78rem;font-weight:700;color:#9a3412;margin-bottom:10px;text-align:center}
.dow-chip{padding:3px 7px;border-radius:20px;font-size:.65rem;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:var(--card);color:var(--muted);user-select:none;transition:all .12s}
.dow-chip.active{background:var(--blue-bg);color:var(--blue);border-color:var(--blue)}
.dow-picker{display:flex;gap:3px;flex-wrap:wrap}
</style>
</head>
<body>
<div id="login-screen" style="display:none"></div>
<div class="top-nav"><div class="top-nav-inner" id="top-nav-inner"></div></div>
<div class="date-bar-wrap" id="date-bar-wrap">
  <div class="date-bar">
    <button class="date-nav-btn" onclick="changeDay(-1)">&#8249;</button>
    <div class="date-bar-text" id="date-bar-text"></div>
    <button class="date-nav-btn" onclick="changeDay(1)">&#8250;</button>
  </div>
</div>
<div class="page-wrap" style="padding-top:10px">
  <div id="no-school-banner"></div>
  <div class="cards" id="cards"></div>
  <div class="dnbox">
    <div class="sec-lbl" style="margin-bottom:5px">&#128221; Daily Note</div>
    <textarea id="daily-note" placeholder="Shared note for today..." rows="2"></textarea>
    <div style="font-size:.59rem;color:#b0bec5;margin-top:3px" id="note-meta"></div>
  </div>
</div>
<div class="confirm-toast" id="confirm-toast"></div>
<script>
const DEFAULT_STATUSES=[{key:"school",icon:"\uD83C\uDFEB",label:"In School",color:"#0ea5e9",bg:"#e0f2fe",deletable:true},{key:"bed",icon:"\uD83D\uDE34",label:"Still in Bed",color:"#6366f1",bg:"#e0e7ff",deletable:true},{key:"ready",icon:"\uD83C\uDF92",label:"Getting Ready",color:"#f59e0b",bg:"#fef3c7",deletable:true},{key:"off",icon:"\uD83C\uDF34",label:"Day Off",color:"#10b981",bg:"#d1fae5",deletable:true},{key:"other",icon:"\uD83D\uDCAC",label:"Other",color:"#64748b",bg:"#f1f5f9",deletable:false,hasNote:true}];
const ICON_OPTIONS=["👦","👧","🧒","🧒‍♂️","🧒‍♀️","🙋‍♂️","🙋‍♀️","👶","🌟","⭐","🦁","🐻","🐼","🦊","🐯","🐸","🦋","🌈","🚀","⚽","🎨","🎵","🦄","🌻"];
const DOW=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
let viewDateOffset=0,dayCache={},historyData={},notifTimers=[],helpTimers={},tempIcons={};
function getStatusList(ks){const base=(ks||DEFAULT_STATUSES).map(s=>({...s}));const list=[...base];Object.values(window.KT?.sharedUserRegistry||{}).forEach(u=>{const key="help_"+u.name.toLowerCase().replace(/\s/g,"_");if(!list.find(s=>s.key===key))list.push({key,icon:"🆘",label:"Need "+u.name+"'s Help",color:u.color||"#dc2626",bg:u.bg||"#fee2e2",isHelp:true,forUser:u.name,deletable:true});});return list;}
function getViewKey(off){const d=new Date();d.setDate(d.getDate()+(off||0));return d.toISOString().split("T")[0];}
function emptyDayData(){const kids={};(window.KT?.settings?.kids||[]).forEach(k=>{kids[k.id]={status:null,statusNote:"",pickup:null,pickupTime:null,dayType:null,endTimeOverride:null,updatedAt:null,updatedBy:null};});return{dailyNote:"",noteUpdatedBy:null,noteUpdatedAt:null,kids};}
function getCurrentDayData(){const k=getViewKey(viewDateOffset);return JSON.parse(JSON.stringify(dayCache[k]||emptyDayData()));}
function saveDayData(data){const k=getViewKey(viewDateOffset);dayCache[k]=data;ktSet("kidtracker/days/"+k,data);}
function stampKid(data,id){data.kids[id].updatedAt=ktFmt(new Date());data.kids[id].updatedBy=window.KT.userName||null;}
document.addEventListener("auth-change",e=>{
  if(!e.detail){document.getElementById("login-screen").style.display="flex";return;}
  document.getElementById("login-screen").style.display="none";
  ktInit("today",()=>{
    ktOn("kidtracker/days",data=>{historyData=data||{};Object.keys(historyData).forEach(k=>{dayCache[k]=historyData[k];});renderToday();});
    ktOn("kidtracker/meta",data=>{const today=new Date().toISOString().split("T")[0];if(data?.lastReset!==today&&new Date().getHours()>=5)ktSet("kidtracker/meta",{lastReset:today});});
    updateDateBar();rebuildCards();renderToday();
  });
});
function updateDateBar(){const d=new Date();d.setDate(d.getDate()+viewDateOffset);let l=d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});if(viewDateOffset===0)l="Today — "+d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});else if(viewDateOffset===-1)l="Yesterday — "+d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});else if(viewDateOffset===1)l="Tomorrow — "+d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});document.getElementById("date-bar-text").textContent=l;}
function changeDay(d){viewDateOffset+=d;updateDateBar();renderToday();}
function rebuildCards(){document.getElementById("cards").innerHTML="";(window.KT.settings.kids||[]).forEach(kid=>{if(!kid.hidden)buildCard(kid);});}
function buildCard(kid){const card=document.createElement("div");card.className="kid-card";card.id="card-"+kid.id;card.innerHTML=`<div class="card-top" id="top-${kid.id}"><div class="kid-av" id="avatar-${kid.id}">${kid.icon}</div><div style="flex:1;min-width:0"><div class="kid-name-txt" id="kname-${kid.id}">${kid.name}</div><div class="kid-meta" id="meta-${kid.id}"></div></div><div class="status-badge" id="badge-${kid.id}">—</div></div><div class="stbar" id="stbar-${kid.id}"><span>🕐</span><span class="stl" id="stl-${kid.id}">School ends</span><span class="stv" id="stv-${kid.id}">${ktFmtTime(kid.endTime||"14:00")}</span><button class="etime-btn" id="etbtn-${kid.id}" onclick="toggleEditTime('${kid.id}')" title="Edit">✏️</button><input type="time" class="etime-inp" id="etinp-${kid.id}" onchange="saveTimeOverride('${kid.id}',this.value)" onblur="cancelEditTime('${kid.id}')"/></div><div class="card-cols"><div class="card-col"><div class="col-lbl">Status</div><div class="chips" id="sc-${kid.id}"></div><div class="status-note" id="snote-${kid.id}"><input type="text" id="snote-inp-${kid.id}" placeholder="Notes…"/></div></div><div class="card-col"><div class="col-lbl">Pickup</div><div class="chips" id="pc-${kid.id}"></div><div class="time-row" id="tr-${kid.id}"><span>🕐</span><input type="time" class="pickup-time" data-kid="${kid.id}" value="${kid.pickupTime||''}"/></div></div><div class="card-col"><div class="col-lbl">Day Type</div><div class="chips"><button class="chip" data-kid="${kid.id}" data-daytype="noschool">🚫 No School</button><button class="chip" data-kid="${kid.id}" data-daytype="halfday">🌤️ Half Day</button></div></div></div>`;
document.getElementById("cards").appendChild(card);rebuildDynamicChips(kid.id);attachCardListeners(kid.id);}
function rebuildDynamicChips(kidId){const kid=window.KT.settings.kids.find(k=>k.id===kidId);if(!kid)return;const sl=getStatusList(kid.statuses);const sc=document.getElementById("sc-"+kidId);if(sc){sc.innerHTML=sl.map(s=>`<button class="chip" data-kid="${kidId}" data-status="${s.key}">${s.icon} ${s.label}</button>`).join("");sc.querySelectorAll(".chip[data-status]").forEach(b=>b.addEventListener("click",()=>{const data=getCurrentDayData();if(!data.kids[b.dataset.kid])data.kids[b.dataset.kid]={status:null,statusNote:"",pickup:null,pickupTime:null,dayType:null,endTimeOverride:null,updatedAt:null,updatedBy:null};const prev=data.kids[b.dataset.kid].status;data.kids[b.dataset.kid].status=prev===b.dataset.status?null:b.dataset.status;if(data.kids[b.dataset.kid].status!=="other")data.kids[b.dataset.kid].statusNote="";stampKid(data,b.dataset.kid);saveDayData(data);renderToday();const st=sl.find(s=>s.key===data.kids[b.dataset.kid].status);if(st?.isHelp&&data.kids[b.dataset.kid].status!==prev)scheduleHelpNotif(kid,st);}));}
const pc=document.getElementById("pc-"+kidId);if(pc){const users=Object.values(window.KT.sharedUserRegistry||{});pc.innerHTML=users.length?users.map(u=>`<button class="chip" data-kid="${kidId}" data-pickup="${u.name.toLowerCase()}">${u.name}</button>`).join(""):`<button class="chip" data-kid="${kidId}" data-pickup="abba">👨 Abba</button><button class="chip" data-kid="${kidId}" data-pickup="ima">👩 Ima</button>`;pc.querySelectorAll(".chip[data-pickup]").forEach(b=>b.addEventListener("click",()=>{const data=getCurrentDayData();if(!data.kids[b.dataset.kid])return;data.kids[b.dataset.kid].pickup=data.kids[b.dataset.kid].pickup===b.dataset.pickup?null:b.dataset.pickup;stampKid(data,b.dataset.kid);saveDayData(data);renderToday();schedulePickupReminders(data);}));}}
function attachCardListeners(kidId){const card=document.getElementById("card-"+kidId);if(!card)return;document.getElementById("snote-inp-"+kidId)?.addEventListener("input",e=>{const data=getCurrentDayData();if(data.kids[kidId]){data.kids[kidId].statusNote=e.target.value;saveDayData(data);}});card.querySelectorAll(".chip[data-daytype]").forEach(b=>b.addEventListener("click",()=>{const data=getCurrentDayData();if(!data.kids[b.dataset.kid])return;const kid=window.KT.settings.kids.find(k=>k.id===b.dataset.kid);const prev=data.kids[b.dataset.kid].dayType;const ndt=prev===b.dataset.daytype?null:b.dataset.daytype;data.kids[b.dataset.kid].dayType=ndt;data.kids[b.dataset.kid].endTimeOverride=null;if(ndt==="halfday")data.kids[b.dataset.kid].pickupTime=kid?.halfdayTime||null;else if(ndt==="noschool")data.kids[b.dataset.kid].pickupTime=null;else data.kids[b.dataset.kid].pickupTime=kid?.pickupTime||null;stampKid(data,b.dataset.kid);saveDayData(data);renderToday();}));const tp=card.querySelector(".pickup-time");if(tp)tp.addEventListener("change",()=>{const data=getCurrentDayData();if(data.kids[kidId]){data.kids[kidId].pickupTime=tp.value;saveDayData(data);schedulePickupReminders(data);}});}
function toggleEditTime(id){document.getElementById("etinp-"+id).style.display="inline-block";document.getElementById("etinp-"+id).focus();document.getElementById("etbtn-"+id).style.display="none";}
function cancelEditTime(id){document.getElementById("etinp-"+id).style.display="none";document.getElementById("etbtn-"+id).style.display="";}
function saveTimeOverride(id,v){const data=getCurrentDayData();if(data.kids[id]){data.kids[id].endTimeOverride=v;stampKid(data,id);saveDayData(data);renderToday();}cancelEditTime(id);}
function renderToday(){const data=dayCache[getViewKey(viewDateOffset)]||emptyDayData();(window.KT.settings.kids||[]).forEach(kid=>{if(!kid.hidden)renderKid(kid,data);});const dn=document.getElementById("daily-note");if(dn&&dn.value!==(data.dailyNote||""))dn.value=data.dailyNote||"";renderNoteMeta(data);const allNS=(window.KT.settings.kids||[]).filter(k=>!k.hidden).every(k=>data.kids?.[k.id]?.dayType==="noschool");const bn=document.getElementById("no-school-banner");bn.style.display=allNS?"block":"none";if(allNS)bn.textContent="🚫 No school today for all kids";}
function renderKid(kid,data){const card=document.getElementById("card-"+kid.id);if(!card)return;const s=data.kids?.[kid.id]||{};const sl=getStatusList(kid.statuses);const st=s.status?sl.find(x=>x.key===s.status):null;const badge=document.getElementById("badge-"+kid.id);if(st){badge.textContent=st.icon+" "+st.label;badge.style.background=st.bg;badge.style.color=st.color;}else{badge.textContent="—";badge.style.background="";badge.style.color="";}document.getElementById("top-"+kid.id).style.background=st?st.bg+"55":"";document.getElementById("meta-"+kid.id).textContent=s.updatedAt?"Updated "+s.updatedAt+(s.updatedBy?" by "+s.updatedBy:""):"";document.getElementById("kname-"+kid.id).textContent=kid.name;const av=document.getElementById("avatar-"+kid.id);if(av)av.innerHTML=kid.iconImg?`<img src="${kid.iconImg}"/>`:(kid.icon||"🧒");const bar=document.getElementById("stbar-"+kid.id);if(bar){const dt=s.dayType;if(dt==="noschool"){bar.className="stbar noschool";document.getElementById("stl-"+kid.id).textContent="";document.getElementById("stv-"+kid.id).textContent="No School Today";document.getElementById("etbtn-"+kid.id).style.display="none";}else{const t=s.endTimeOverride||(dt==="halfday"?kid.halfdayTime:kid.endTime)||"—";bar.className="stbar"+(dt==="halfday"?" halfday":"");document.getElementById("stl-"+kid.id).textContent=dt==="halfday"?"Half day ends":"School ends";document.getElementById("stv-"+kid.id).textContent=ktFmtTime(t);document.getElementById("etbtn-"+kid.id).style.display="";}}
const sc=document.getElementById("sc-"+kid.id);if(sc)sc.querySelectorAll(".chip[data-status]").forEach(b=>{const isA=b.dataset.status===s.status;b.classList.toggle("active",isA);const st2=sl.find(x=>x.key===b.dataset.status);if(isA&&st2){b.style.background=st2.bg;b.style.color=st2.color;b.style.borderColor=st2.color;}else{b.style.background="";b.style.color="";b.style.borderColor="";}});
const snote=document.getElementById("snote-"+kid.id);const snoteInp=document.getElementById("snote-inp-"+kid.id);const showNote=st&&(st.hasNote||st.key==="other");if(snote)snote.classList.toggle("visible",!!showNote);if(snoteInp&&snoteInp.value!==(s.statusNote||""))snoteInp.value=s.statusNote||"";
const pc=document.getElementById("pc-"+kid.id);if(pc)pc.querySelectorAll(".chip[data-pickup]").forEach(b=>{const isA=b.dataset.pickup===s.pickup;b.classList.toggle("active",isA);if(isA){b.style.background="#dbeafe";b.style.color="#1d4ed8";b.style.borderColor="#1d4ed8";}else{b.style.background="";b.style.color="";b.style.borderColor="";}});
card.querySelectorAll(".chip[data-daytype]").forEach(b=>{const isA=b.dataset.daytype===s.dayType;b.classList.toggle("active",isA);if(b.dataset.daytype==="noschool"){b.style.background=isA?"#fff7ed":"";b.style.color=isA?"#c2410c":"";b.style.borderColor=isA?"#fb923c":"";}else{b.style.background=isA?"#f0fdf4":"";b.style.color=isA?"#15803d":"";b.style.borderColor=isA?"#4ade80":"";}});
const tp=card.querySelector(".pickup-time");const tr=document.getElementById("tr-"+kid.id);const pt=s.pickupTime||(s.dayType==="noschool"?null:s.dayType==="halfday"?kid.halfdayTime:kid.pickupTime)||null;if(tp){if(pt&&s.dayType!=="noschool"){tp.style.display="";if(tp.value!==pt)tp.value=pt;const[ph,pm]=pt.split(":").map(Number);const diff=(ph*60+pm)-(new Date().getHours()*60+new Date().getMinutes());tr?.classList.toggle("soon",diff>=0&&diff<=30);}else{tp.value="";tp.style.display="none";tr?.classList.remove("soon");}}}
function renderNoteMeta(data){const m=document.getElementById("note-meta");if(m)m.textContent=data?.noteUpdatedAt?"Updated "+data.noteUpdatedAt+(data.noteUpdatedBy?" by "+data.noteUpdatedBy:""):"";}
let noteTimer;document.getElementById("daily-note").addEventListener("input",()=>{clearTimeout(noteTimer);noteTimer=setTimeout(()=>{const data=getCurrentDayData();data.dailyNote=document.getElementById("daily-note").value;data.noteUpdatedBy=window.KT.userName||null;data.noteUpdatedAt=ktFmt(new Date());saveDayData(data);renderNoteMeta(data);},600);});
function schedulePickupReminders(data){notifTimers.forEach(t=>clearTimeout(t));notifTimers=[];if(!("Notification" in window)||Notification.permission!=="granted")return;const mins=window.KT.settings.notifPickupMins||30;(window.KT.settings.kids||[]).forEach(kid=>{const ks=data?.kids?.[kid.id]||{};if(ks.pickup?.toLowerCase()!==window.KT.userName?.toLowerCase())return;const pt=ks.pickupTime||kid.pickupTime;if(!pt)return;const[ph,pm]=pt.split(":").map(Number);const rem=new Date();rem.setHours(ph,pm-mins,0,0);const ms=rem.getTime()-Date.now();if(ms>0)notifTimers.push(setTimeout(()=>{ktNotify("🚗 Pickup in "+mins+" min","You're picking up "+kid.name+" at "+ktFmtTime(pt),{vibrate:[200,100,200]});},ms));});}
function scheduleHelpNotif(kid,statusDef){const delay=(window.KT.settings.notifHelpDelaySecs||30)*1000;const kidKey=kid.id+"_"+statusDef.key;clearTimeout(helpTimers[kidKey]);const toast=document.getElementById("confirm-toast");let remaining=Math.ceil(delay/1000);toast.textContent=statusDef.icon+" "+kid.name+" needs help — alerting in "+remaining+"s · tap to cancel";toast.classList.add("visible");const cd=setInterval(()=>{remaining--;if(remaining<=0){clearInterval(cd);toast.classList.remove("visible");return;}toast.textContent=statusDef.icon+" "+kid.name+" needs help — alerting in "+remaining+"s · tap to cancel";},1000);helpTimers[kidKey]=setTimeout(()=>{clearInterval(cd);toast.classList.remove("visible");const forUser=statusDef.forUser?.toLowerCase();if(forUser&&window.KT.userName&&forUser===window.KT.userName.toLowerCase())ktNotify("🆘 "+kid.name+" needs your help!",'"'+statusDef.label+'"',{persist:true,vibrate:[300,100,300,100,300]});},delay);toast.onclick=()=>{clearTimeout(helpTimers[kidKey]);clearInterval(cd);toast.classList.remove("visible");const data=getCurrentDayData();if(data.kids[kid.id]?.status===statusDef.key){data.kids[kid.id].status=null;saveDayData(data);renderToday();};};}
// Settings extension
const _origOpen=window.ktOpenSettings;window.ktOpenSettings=function(){if(_origOpen)_origOpen();setTimeout(appendKidSettings,120);};
function appendKidSettings(){const content=document.getElementById("kt-settings-content");if(!content||document.getElementById("kid-settings-section"))return;const section=document.createElement("div");section.id="kid-settings-section";section.innerHTML=`<div style="margin-top:12px">${(window.KT.settings.kids||[]).map(kid=>buildKidSec(kid)).join("")}<button class="btn btn-ghost btn-full" style="margin-top:4px" onclick="addNewKid()">➕ Add a child</button></div>`;content.appendChild(section);(window.KT.settings.kids||[]).forEach(kid=>initKidSec(kid));}
function buildKidSec(kid){tempIcons[kid.id]={icon:kid.icon,iconImg:kid.iconImg||null};return `<div class="ssec" id="kid-sec-${kid.id}"><div class="ssec-title"><span id="kid-sec-title-${kid.id}">${kid.iconImg?"📷":kid.icon} ${kid.name}</span><button style="font-size:.68rem;font-weight:700;color:var(--red);background:#fff5f5;border:1.5px solid #fca5a5;border-radius:6px;padding:2px 8px;cursor:pointer" onclick="removeKid('${kid.id}')">Remove</button></div><div class="srow"><div><div class="slbl">Name</div></div><input type="text" class="kt-input" style="width:140px" id="ks-name-${kid.id}" value="${kid.name}"/></div><div class="srow"><div><div class="slbl">Hide from Today</div><div class="ssub">For vacations</div></div><div class="tog-wrap" onclick="toggleKidHide('${kid.id}')"><div class="tog-track${kid.hidden?" on":""}" id="ks-tog-${kid.id}"><div class="tog-thumb"></div></div><span style="font-size:.72rem;font-weight:700;color:var(--muted)" id="ks-tog-lbl-${kid.id}">${kid.hidden?"Hidden":"Visible"}</span></div></div><div class="srow"><div><div class="slbl">School Days</div></div><div class="dow-picker" id="ks-dow-${kid.id}"></div></div><div class="srow"><div><div class="slbl">School End Time</div></div><input type="time" class="kt-input" style="width:100px" id="ks-end-${kid.id}" value="${kid.endTime||'14:00'}"/></div><div class="srow"><div><div class="slbl">Half Day End</div></div><input type="time" class="kt-input" style="width:100px" id="ks-hd-${kid.id}" value="${kid.halfdayTime||'12:00'}"/></div><div class="srow"><div><div class="slbl">Default Pickup</div></div><input type="time" class="kt-input" style="width:100px" id="ks-pt-${kid.id}" value="${kid.pickupTime||''}"/></div><div class="srow" style="flex-direction:column;align-items:flex-start;gap:7px"><div><div class="slbl">Icon / Photo</div></div><div class="icon-picker" id="ks-ip-${kid.id}" style="display:flex;flex-wrap:wrap;gap:4px"></div><label style="display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:8px;border:1.5px dashed var(--border);background:var(--card);color:var(--muted);font-family:'Nunito',sans-serif;font-weight:700;font-size:.72rem;cursor:pointer;margin-top:4px">📷 Upload<input type="file" accept="image/*" style="display:none" onchange="handleKidIconUpload(event,'${kid.id}')"/></label><div id="ks-ip-preview-${kid.id}">${kid.iconImg?`<img src="${kid.iconImg}" style="width:34px;height:34px;border-radius:50%;object-fit:cover;border:2px solid var(--blue)"/>`:""}</div></div></div>`;}
function initKidSec(kid){const dp=document.getElementById("ks-dow-"+kid.id);if(!dp)return;const sd=kid.schoolDays||[0,1,2,3,4,5];dp.innerHTML=DOW.map((n,i)=>`<div class="dow-chip${sd.includes(i)?" active":""}" data-kid="${kid.id}" data-dow="${i}">${n}</div>`).join("");dp.querySelectorAll(".dow-chip").forEach(c=>c.addEventListener("click",()=>{const dw=parseInt(c.dataset.dow);const ks=window.KT.settings.kids.find(k=>k.id===c.dataset.kid);if(!ks.schoolDays)ks.schoolDays=[0,1,2,3,4,5];const idx=ks.schoolDays.indexOf(dw);if(idx>-1)ks.schoolDays.splice(idx,1);else ks.schoolDays.push(dw);ks.schoolDays.sort();c.classList.toggle("active",ks.schoolDays.includes(dw));}));const ip=document.getElementById("ks-ip-"+kid.id);if(!ip)return;ICON_OPTIONS.forEach(ic=>{const opt=document.createElement("div");opt.style.cssText="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;cursor:pointer;border:2px solid transparent;background:#f0f4f8;transition:all .12s;overflow:hidden";if(tempIcons[kid.id]?.icon===ic&&!tempIcons[kid.id]?.iconImg)opt.style.borderColor="var(--blue)";opt.textContent=ic;opt.addEventListener("click",()=>{tempIcons[kid.id]={icon:ic,iconImg:null};ip.querySelectorAll("div").forEach(o=>o.style.borderColor="transparent");opt.style.borderColor="var(--blue)";document.getElementById("ks-ip-preview-"+kid.id).innerHTML="";document.getElementById("kid-sec-title-"+kid.id).textContent=ic+" "+(document.getElementById("ks-name-"+kid.id)?.value||kid.name);});ip.appendChild(opt);});}
function toggleKidHide(kidId){const kid=window.KT.settings.kids.find(k=>k.id===kidId);if(!kid)return;kid.hidden=!kid.hidden;document.getElementById("ks-tog-"+kidId).classList.toggle("on",kid.hidden);document.getElementById("ks-tog-lbl-"+kidId).textContent=kid.hidden?"Hidden":"Visible";}
function handleKidIconUpload(event,kidId){const file=event.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{const url=e.target.result;tempIcons[kidId]={icon:null,iconImg:url};document.getElementById("ks-ip-preview-"+kidId).innerHTML=`<img src="${url}" style="width:34px;height:34px;border-radius:50%;object-fit:cover;border:2px solid var(--blue)"/>`;document.getElementById("kid-sec-title-"+kidId).textContent="📷 "+(document.getElementById("ks-name-"+kidId)?.value||kidId);};reader.readAsDataURL(file);}
function removeKid(kidId){if(!confirm("Remove this child?"))return;window.KT.settings.kids=window.KT.settings.kids.filter(k=>k.id!==kidId);document.getElementById("kid-sec-"+kidId)?.remove();rebuildCards();}
function addNewKid(){const id="kid_"+Date.now();window.KT.settings.kids.push({id,name:"New Child",icon:"🧒",schoolDays:[0,1,2,3,4,5],endTime:"14:00",halfdayTime:"12:00",pickupTime:null,statuses:null,hidden:false});const section=document.getElementById("kid-settings-section");if(section){const newKid=window.KT.settings.kids[window.KT.settings.kids.length-1];const d=document.createElement("div");d.innerHTML=buildKidSec(newKid);section.insertBefore(d.firstElementChild,section.lastElementChild);initKidSec(newKid);}}
const _origSave=window.ktSaveSettings;window.ktSaveSettings=function(){(window.KT.settings.kids||[]).forEach(kid=>{kid.name=document.getElementById("ks-name-"+kid.id)?.value?.trim()||kid.name;kid.endTime=document.getElementById("ks-end-"+kid.id)?.value||kid.endTime;kid.halfdayTime=document.getElementById("ks-hd-"+kid.id)?.value||kid.halfdayTime;kid.pickupTime=document.getElementById("ks-pt-"+kid.id)?.value||null;if(tempIcons[kid.id]){if(tempIcons[kid.id].iconImg)kid.iconImg=tempIcons[kid.id].iconImg;else{kid.icon=tempIcons[kid.id].icon||kid.icon;kid.iconImg=null;}}});const icons={};(window.KT.settings.kids||[]).forEach(k=>{if(k.iconImg)icons[k.id]=k.iconImg;});ktSaveLocal("icons",icons);ktSet("kidtracker/settings/kids",window.KT.settings.kids.map(k=>({...k,iconImg:undefined})));if(_origSave)_origSave();document.getElementById("kid-settings-section")?.remove();rebuildCards();renderToday();};
setInterval(()=>{renderToday();},60000);
document.getElementById("login-screen").innerHTML=KT_LOGIN_HTML;
</script>
</body>
