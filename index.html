<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="KidTracker"/>
<meta name="theme-color" content="#2563eb"/>
<title>KidTracker</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800;900&display=swap" rel="stylesheet"/>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  const firebaseConfig = {
    apiKey:            "AIzaSyCrCg11nB8I2f-3rQwN8NkwzSQrnQ9c8Rs",
    authDomain:        "kidtracker-3e5d9.firebaseapp.com",
    databaseURL:       "https://kidtracker-3e5d9-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId:         "kidtracker-3e5d9",
    storageBucket:     "kidtracker-3e5d9.firebasestorage.app",
    messagingSenderId: "206740291278",
    appId:             "1:206740291278:web:b48194ff4da011534b1a9f",
    measurementId:     "G-ZZ0XNLBN56"
  };
  try {
    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);
    window._fbSet = (p,v) => set(ref(db,p),v);
    window._fbOn  = (p,cb) => onValue(ref(db,p), s => cb(s.val()));
    document.dispatchEvent(new Event("firebase-ready"));
  } catch(e) { console.warn("Firebase:",e.message); }
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}

:root{
  --bg:#f0f4f9;--card:#fff;--border:#e2e8f0;--text:#1c2b3a;--muted:#8898aa;
  --radius:14px;--shadow:0 2px 14px rgba(0,0,0,.07);--max-w:640px;--nav-h:52px;
  --school:#2563eb;--school-bg:#dbeafe;
  --ready:#d97706; --ready-bg:#fef3c7;
  --sleep:#7c3aed; --sleep-bg:#ede9fe;
  --off:#475569;   --off-bg:#e2e8f0;
  --help:#dc2626;  --help-bg:#fee2e2;
  --abba:#1d4ed8;  --abba-bg:#dbeafe;
  --ima:#be185d;   --ima-bg:#fce7f3;
}

body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text)}

/* ── Top nav ── */
.top-nav{
  background:var(--card);
  border-bottom:1.5px solid var(--border);
  box-shadow:0 2px 8px rgba(0,0,0,.06);
  position:sticky;top:0;z-index:50;
}
.top-nav-inner{
  display:flex;align-items:center;
  max-width:var(--max-w);margin:0 auto;
  padding:0 12px;height:var(--nav-h);
  gap:4px;
}
.logo{font-size:1rem;font-weight:900;letter-spacing:-.3px;color:var(--text);flex-shrink:0}
.logo span{color:var(--school)}
.nav-spacer{flex:1}
.nav-tab{
  display:flex;align-items:center;gap:4px;
  padding:6px 10px;border-radius:8px;
  font-family:'Nunito',sans-serif;font-weight:700;font-size:.78rem;
  cursor:pointer;border:none;background:transparent;color:var(--muted);
  transition:all .15s;white-space:nowrap;
}
.nav-tab:hover{background:#f1f5f9;color:var(--text)}
.nav-tab.active{background:var(--school-bg);color:var(--school)}
.nav-tab .ti{font-size:.95rem}

/* ── Date bar ── */
.date-bar{
  background:var(--card);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  gap:12px;
  padding:8px 16px;
  max-width:var(--max-w);margin:0 auto;
}
.date-bar-text{
  font-weight:800;font-size:.95rem;color:#374151;
  min-width:160px;text-align:center;
}
.date-nav-btn{
  background:none;border:1.5px solid var(--border);border-radius:8px;
  width:30px;height:30px;cursor:pointer;font-size:.9rem;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;color:var(--text);flex-shrink:0;
}
.date-nav-btn:hover{background:#f1f5f9}

/* ── Pages ── */
.page{display:none;padding:12px 12px 40px;max-width:var(--max-w);margin:0 auto}
.page.active{display:block}

/* ── Kid cards ── */
.cards{display:flex;flex-direction:column;gap:10px}
.kid-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.card-top{display:flex;align-items:center;gap:10px;padding:10px 13px;border-bottom:1.5px solid var(--border);transition:background .3s}
.kid-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#f0f4f8;flex-shrink:0;font-size:1.4rem;overflow:hidden}
.kid-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.kid-info{flex:1;min-width:0}
.kid-name{font-weight:900;font-size:.95rem;line-height:1}
.kid-sub{font-size:.68rem;font-weight:700;color:var(--muted);margin-top:2px;transition:color .2s}
.kid-meta{font-size:.6rem;color:#b0bec5;font-weight:600;margin-top:1px}
.status-badge{font-size:.64rem;font-weight:800;padding:3px 8px;border-radius:20px;background:var(--border);color:var(--muted);white-space:nowrap;flex-shrink:0;transition:all .25s}
.card-body{display:grid;grid-template-columns:1fr 1fr}
.card-section{padding:9px 11px 10px}
.card-section:first-child{border-right:1.5px solid var(--border)}
.slabel{font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:6px}

/* ── Chips ── */
.chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{display:inline-flex;align-items:center;gap:3px;padding:4px 9px;border-radius:20px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.68rem;cursor:pointer;border:1.5px solid transparent;background:#f1f5f9;color:var(--muted);transition:all .12s;white-space:nowrap;user-select:none}
.chip:hover{filter:brightness(.93);transform:translateY(-1px)}
.chip:active{transform:scale(.95)}
.chip[data-status="school"].active{background:var(--school-bg);color:var(--school);border-color:var(--school)}
.chip[data-status="ready"].active{background:var(--ready-bg);color:var(--ready);border-color:var(--ready)}
.chip[data-status="sleep"].active{background:var(--sleep-bg);color:var(--sleep);border-color:var(--sleep)}
.chip[data-status="off"].active{background:var(--off-bg);color:var(--off);border-color:var(--off)}
.chip[data-status="help"].active{background:var(--help-bg);color:var(--help);border-color:var(--help)}
.chip[data-pickup="abba"].active{background:var(--abba-bg);color:var(--abba);border-color:var(--abba)}
.chip[data-pickup="ima"].active{background:var(--ima-bg);color:var(--ima);border-color:var(--ima)}
.chip[data-daytype="noschool"].active{background:#fff7ed;color:#c2410c;border-color:#fb923c}
.chip[data-daytype="halfday"].active{background:#f0fdf4;color:#15803d;border-color:#4ade80}

.day-off-note{display:none;margin-top:6px}
.day-off-note.visible{display:block}
.day-off-note input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:5px 9px;font-family:'Nunito',sans-serif;font-size:.7rem;font-weight:600;color:var(--text);background:#f8fafc;outline:none}
.day-off-note input::placeholder{color:#c0ccd8}

.time-row{display:inline-flex;align-items:center;gap:4px;margin-top:7px;background:#f8fafc;border:1.5px solid var(--border);border-radius:8px;padding:4px 8px}
.time-row span{font-size:.7rem;color:var(--muted)}
.time-row input[type=time]{border:none;background:transparent;font-family:'Nunito',sans-serif;font-weight:700;font-size:.73rem;color:var(--text);outline:none;cursor:pointer}
.time-row.soon{border-color:#fb923c;background:#fff7ed}
.time-row.soon span,.time-row.soon input{color:#c2410c}

/* ── Daily note ── */
.daily-note-box{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:11px 13px;margin-top:10px}
.daily-note-box textarea{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;font-family:'Nunito',sans-serif;font-size:.78rem;font-weight:600;color:var(--text);background:#f8fafc;outline:none;resize:none;min-height:52px}
.daily-note-box textarea::placeholder{color:#c0ccd8}
.note-meta{font-size:.6rem;color:#b0bec5;margin-top:4px}

/* ── Calendar ── */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav-btn{background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:5px 12px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.8rem;cursor:pointer;color:var(--text)}
.cal-nav-btn:hover{background:#f1f5f9}
.cal-month{font-weight:900;font-size:1rem}
.cal-grid{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1.5px solid var(--border)}
.cal-dow{text-align:center;padding:6px 2px;font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.cal-dow.we{color:#f87171}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-day{border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:3px 2px 4px;min-height:80px;cursor:pointer;transition:background .12s}
.cal-day:nth-child(7n){border-right:none}
.cal-day:hover{background:#f8fafc}
.cal-day.today{background:#eff6ff}
.cal-day.today .cdn{color:var(--school);font-weight:900}
.cal-day.om{background:#fafafa}
.cal-day.om .cdn{color:#d1d5db}
.cal-day.noschoolday{background:#fff7ed}
.cdn{font-size:.7rem;font-weight:800;color:var(--text);display:block;text-align:center;margin-bottom:3px}
.cal-capsules{display:flex;flex-direction:column;gap:2px;padding:0 2px}
.cal-capsule{
  display:flex;align-items:center;justify-content:space-between;
  border-radius:20px;padding:2px 5px;
  font-size:.55rem;font-weight:800;
}
.cal-capsule-left{display:flex;align-items:center;gap:2px}
.cal-capsule-avatar{width:14px;height:14px;border-radius:50%;object-fit:cover;font-size:.6rem;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.cal-capsule-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.cal-day-tag{font-size:.48rem;font-weight:800;text-align:center;color:#c2410c;margin-top:1px}

/* Cal detail */
.cal-detail{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);margin-top:10px;padding:13px;display:none}
.cal-detail.visible{display:block}
.cal-detail-title{font-weight:900;font-size:.95rem;margin-bottom:10px}
.cal-detail-kid{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.cal-detail-kid:last-child{border-bottom:none}
.cal-detail-avatar{width:28px;height:28px;border-radius:50%;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#f0f4f8;font-size:1rem}
.cal-detail-avatar img{width:100%;height:100%;object-fit:cover}
.cal-dn{font-weight:800;font-size:.82rem;width:68px;flex-shrink:0}
.cal-badges{display:flex;flex-wrap:wrap;gap:4px}
.mbadge{font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:20px}

/* ── Settings modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.visible{display:flex}
.modal{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:var(--max-w);max-height:92vh;overflow-y:auto;padding:16px 16px 36px;animation:slideUp .25s ease;position:relative}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:#e2e8f0;border-radius:20px;margin:0 auto 14px}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--muted)}
.modal-title{font-size:1.05rem;font-weight:900;margin-bottom:14px}
.ssection{background:#f8fafc;border:1.5px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden}
.ssection-title{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);padding:9px 12px 7px;border-bottom:1.5px solid var(--border);background:#f0f4f8}
.srow{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--border);gap:10px}
.srow:last-child{border-bottom:none}
.slbl{font-size:.82rem;font-weight:700}
.ssub{font-size:.67rem;color:var(--muted);font-weight:600;margin-top:1px}
.sctl{flex-shrink:0}
.sctl input[type=time]{border:1.5px solid var(--border);border-radius:8px;padding:5px 8px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.78rem;color:var(--text);outline:none;background:var(--card);cursor:pointer;width:100px}
.sctl input[type=time]:focus{border-color:#60a5fa}
.sctl input[type=text]{border:1.5px solid var(--border);border-radius:8px;padding:5px 8px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.78rem;color:var(--text);outline:none;background:var(--card);width:110px}
.sctl input[type=text]:focus{border-color:#60a5fa}
.dow-picker{display:flex;gap:4px;flex-wrap:wrap}
.dow-chip{padding:4px 8px;border-radius:20px;font-size:.68rem;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:var(--card);color:var(--muted);user-select:none;transition:all .12s}
.dow-chip.active{background:var(--school-bg);color:var(--school);border-color:var(--school)}

/* Icon picker */
.icon-picker{display:flex;flex-wrap:wrap;gap:6px;padding:4px 0}
.icon-opt{
  width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;cursor:pointer;
  border:2px solid transparent;
  background:#f0f4f8;transition:all .12s;
  overflow:hidden;
}
.icon-opt:hover{border-color:var(--school);transform:scale(1.08)}
.icon-opt.selected{border-color:var(--school);box-shadow:0 0 0 3px var(--school-bg)}
.icon-opt img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.upload-btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 12px;border-radius:8px;
  border:1.5px dashed var(--border);
  background:var(--card);color:var(--muted);
  font-family:'Nunito',sans-serif;font-weight:700;font-size:.75rem;
  cursor:pointer;transition:all .15s;margin-top:6px;
}
.upload-btn:hover{border-color:var(--school);color:var(--school)}

.save-btn{width:100%;padding:12px;border:none;border-radius:10px;background:var(--school);color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:.9rem;cursor:pointer;margin-top:12px;transition:background .15s}
.save-btn:hover{background:#1d4ed8}
.reset-btn{width:100%;padding:10px;border:1.5px solid #fca5a5;border-radius:10px;background:#fff5f5;color:#dc2626;font-family:'Nunito',sans-serif;font-weight:800;font-size:.82rem;cursor:pointer;margin-top:8px}
.reset-btn:hover{background:#fee2e2}
.notif-btn{padding:5px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-family:'Nunito',sans-serif;font-weight:700;font-size:.75rem;cursor:pointer}
</style>
</head>
<body>

<!-- ══ TOP NAV ══ -->
<div class="top-nav">
  <div class="top-nav-inner">
    <div class="logo">🧒 <span>Kid</span>Tracker</div>
    <div class="nav-spacer"></div>
    <button class="nav-tab active" id="nav-today" onclick="showPage('today')">
      <span class="ti">🏠</span> Today
    </button>
    <button class="nav-tab" id="nav-calendar" onclick="showPage('calendar')">
      <span class="ti">📅</span> Calendar
    </button>
    <button class="nav-tab" id="nav-settings-btn" onclick="openSettings()">
      <span class="ti">⚙️</span> Settings
    </button>
  </div>
</div>

<!-- ══ DATE BAR (Today page only) ══ -->
<div id="date-bar-wrap" style="background:var(--card);border-bottom:1px solid var(--border)">
  <div class="date-bar" style="max-width:var(--max-w);margin:0 auto">
    <button class="date-nav-btn" onclick="changeDay(-1)">‹</button>
    <div class="date-bar-text" id="date-bar-text"></div>
    <button class="date-nav-btn" onclick="changeDay(1)">›</button>
  </div>
</div>

<!-- ══ TODAY ══ -->
<div class="page active" id="page-today">
  <div id="no-school-banner" style="display:none;background:#fff7ed;border:1.5px solid #fb923c;border-radius:10px;padding:8px 12px;font-size:.8rem;font-weight:700;color:#9a3412;margin-bottom:10px;text-align:center"></div>
  <div class="cards" id="cards"></div>
  <div class="daily-note-box">
    <div class="slabel">📝 Daily Note</div>
    <textarea id="daily-note" placeholder="Shared note — reminders, updates, anything…" rows="2"></textarea>
    <div class="note-meta" id="note-meta"></div>
  </div>
</div>

<!-- ══ CALENDAR ══ -->
<div class="page" id="page-calendar">
  <div class="cal-nav">
    <button class="cal-nav-btn" id="cal-prev">‹ Prev</button>
    <div class="cal-month" id="cal-month-label"></div>
    <button class="cal-nav-btn" id="cal-next">Next ›</button>
  </div>
  <div class="cal-grid">
    <div class="cal-dow-row" id="cal-dow-row"></div>
    <div class="cal-days" id="cal-days"></div>
  </div>
  <div class="cal-detail" id="cal-detail">
    <div class="cal-detail-title" id="cal-detail-title"></div>
    <div id="cal-detail-body"></div>
  </div>
</div>

<!-- ══ SETTINGS MODAL ══ -->
<div class="modal-overlay" id="settings-modal" onclick="handleModalBg(event)">
  <div class="modal" id="modal-inner">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeSettings()">✕</button>
    <div class="modal-title">⚙️ Settings</div>

    <!-- Who are you -->
    <div class="ssection">
      <div class="ssection-title">Your Identity (saved on this device only)</div>
      <div class="srow">
        <div><div class="slbl">Your name</div><div class="ssub">Shows on updates — unique per device</div></div>
        <div class="sctl"><input type="text" id="s-username" placeholder="Abba or Ima"/></div>
      </div>
    </div>

    <!-- Per-kid sections -->
    <div id="per-kid-sections"></div>

    <!-- Notifications -->
    <div class="ssection">
      <div class="ssection-title">Notifications</div>
      <div class="srow">
        <div><div class="slbl">Pickup Reminders</div><div class="ssub">Alert 15 min before pickup time</div></div>
        <div class="sctl"><button class="notif-btn" id="notif-btn" onclick="requestNotifications()">Enable</button></div>
      </div>
    </div>

    <button class="save-btn" onclick="saveSettings()">💾 Save Settings</button>
    <button class="reset-btn" onclick="resetToday()">🔄 Reset Today's Statuses</button>
  </div>
</div>

<script>
// ═══════════════════════════
// CONSTANTS
// ═══════════════════════════
const KIDS_DEFAULT = [
  {id:"shlomo",   name:"Shlomo",   icon:"👦"},
  {id:"zecharya", name:"Zecharya", icon:"🧒"},
  {id:"rivka",    name:"Rivka",    icon:"👧"},
];
const ICON_OPTIONS = ["👦","👧","🧒","🧒‍♂️","🧒‍♀️","🙋‍♂️","🙋‍♀️","🧑","👶","🌟","⭐","🦁","🐻","🐼","🐨","🦊","🐯","🐸","🦋","🌈","🚀","⚽","🎨","🎵"];
const STATUSES = [
  {key:"school", icon:"🏫", label:"In School"},
  {key:"ready",  icon:"🎒", label:"Getting Ready"},
  {key:"sleep",  icon:"😴", label:"Sleeping"},
  {key:"off",    icon:"🏖️",  label:"Day Off"},
  {key:"help",   icon:"🆘", label:"Need Abba's Help"},
];
const SC={school:"#2563eb",ready:"#d97706",sleep:"#7c3aed",off:"#475569",help:"#dc2626"};
const SB={school:"#dbeafe",ready:"#fef3c7",sleep:"#ede9fe",off:"#e2e8f0",help:"#fee2e2"};
const DOW=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

// ═══════════════════════════
// STATE
// ═══════════════════════════
// Local (per device)
let localSettings = JSON.parse(localStorage.getItem("kt_local")||"{}");
// userName is local only
let userName = localSettings.userName || "";

// Shared via Firebase
let settings = {
  kids: KIDS_DEFAULT.map(k=>({...k, schoolDays:[0,1,2,3,4,5], endTime:"14:00", halfdayTime:"12:00", pickupTime: k.id==="shlomo"?"15:30":k.id==="zecharya"?"16:45":null})),
};

let viewDateOffset = 0; // 0=today, -1=yesterday, etc
function getViewKey(offset) {
  const d = new Date();
  d.setDate(d.getDate() + (offset||0));
  return d.toISOString().split("T")[0];
}

let dayCache = {}; // dateKey -> data
let historyData = {};

// ═══════════════════════════
// DATE BAR
// ═══════════════════════════
function updateDateBar() {
  const d = new Date();
  d.setDate(d.getDate() + viewDateOffset);
  const isToday = viewDateOffset === 0;
  const isYesterday = viewDateOffset === -1;
  const isTomorrow = viewDateOffset === 1;
  let label = d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
  if(isToday) label = "Today — " + d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
  if(isYesterday) label = "Yesterday — " + d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
  if(isTomorrow) label = "Tomorrow — " + d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
  document.getElementById("date-bar-text").textContent = label;
}

function changeDay(delta) {
  viewDateOffset += delta;
  updateDateBar();
  loadDayData(getViewKey(viewDateOffset));
}
updateDateBar();

// ═══════════════════════════
// FIREBASE
// ═══════════════════════════
const DB_HIST = "kidtracker/days";
const DB_SET  = "kidtracker/settings";
const DB_META = "kidtracker/meta";

function dbDay(dateKey){ return `kidtracker/days/${dateKey}`; }

function syncDay(dateKey, data) {
  if(window._fbSet) window._fbSet(dbDay(dateKey), data);
}
function syncSettings() {
  if(window._fbSet) window._fbSet(DB_SET, settings);
}

function emptyDayData() {
  const kids={};
  KIDS_DEFAULT.forEach(k=>{kids[k.id]={status:null,dayOffNote:"",pickup:null,pickupTime:null,dayType:null,updatedAt:null,updatedBy:null};});
  return {dailyNote:"",noteUpdatedBy:null,noteUpdatedAt:null,kids};
}

function loadDayData(dateKey) {
  if(dayCache[dateKey]) { renderToday(dayCache[dateKey]); return; }
  // Will be loaded via onValue listener
  renderToday(emptyDayData());
}

document.addEventListener("firebase-ready", () => {
  // Listen all days
  window._fbOn(DB_HIST, data => {
    historyData = data||{};
    // Update cache
    Object.keys(historyData).forEach(k=>{ dayCache[k]=historyData[k]; });
    renderToday(dayCache[getViewKey(viewDateOffset)]||emptyDayData());
  });

  window._fbOn(DB_SET, data => {
    if(data && data.kids) {
      // Merge per-kid settings
      settings.kids = KIDS_DEFAULT.map(kd=>{
        const saved = data.kids.find?.(x=>x.id===kd.id) || (Array.isArray(data.kids)?null:data.kids[kd.id]);
        return saved ? {...kd,...saved} : kd;
      });
      if(!Array.isArray(settings.kids)) {
        settings.kids = KIDS_DEFAULT.map(kd=>({...kd,...(data.kids[kd.id]||{})}));
      }
    }
  });

  // Auto-reset
  window._fbOn(DB_META, data => {
    const today = new Date().toISOString().split("T")[0];
    if(data?.lastReset !== today && new Date().getHours() >= 5) {
      window._fbSet(DB_META, {lastReset: today});
    }
  });

  document.getElementById("live-pip") && document.getElementById("live-pip").classList.add("on");
});

      </div>
      <div class="status-badge" id="badge-${kid.id}">—</div>
    </div>

      <div class="card-section">
        <div class="slabel">Status</div>
        <div class="chips">
          ${STATUSES.map(s=>`<button class="chip" data-kid="${kid.id}" data-status="${s.key}">${s.icon} ${s.label}</button>`).join("")}
        </div>
        <div class="day-off-note" id="don-${kid.id}">

        </div>
      </div>

        <div class="slabel">Pickup & Day</div>
        <div class="chips">
          <button class="chip" data-kid="${kid.id}" data-pickup="abba">👨 Abba</button>
          <button class="chip" data-kid="${kid.id}" data-pickup="ima">👩 Ima</button>

          <button class="chip" data-kid="${kid.id}" data-daytype="noschool">🚫 No School</button>

  container.appendChild(card);

  card.querySelectorAll(".chip[data-status]").forEach(b=>b.addEventListener("click",()=>{
    const data=getCurrentDayData();
    data.kids[b.dataset.kid].status = data.kids[b.dataset.kid].status===b.dataset.status?null:b.dataset.status;
    if(data.kids[b.dataset.kid].status!=="off") data.kids[b.dataset.kid].dayOffNote="";
    stampKid(data, b.dataset.kid);
    saveDayData(data); renderToday(data);
  }));

  document.getElementById(`don-inp-${kid.id}`).addEventListener("input",e=>{
    const data=getCurrentDayData();
    data.kids[kid.id].dayOffNote=e.target.value;
    saveDayData(data);
  });

  card.querySelectorAll(".chip[data-pickup]").forEach(b=>b.addEventListener("click",()=>{
    const data=getCurrentDayData();
    data.kids[b.dataset.kid].pickup = data.kids[b.dataset.kid].pickup===b.dataset.pickup?null:b.dataset.pickup;
    stampKid(data, b.dataset.kid);
    saveDayData(data); renderToday(data);
  }));

  card.querySelectorAll(".chip[data-daytype]").forEach(b=>b.addEventListener("click",()=>{
    const data=getCurrentDayData();
    data.kids[b.dataset.kid].dayType = data.kids[b.dataset.kid].dayType===b.dataset.daytype?null:b.dataset.daytype;
    stampKid(data, b.dataset.kid);
    saveDayData(data); renderToday(data);
  }));

  const tp=card.querySelector(".pickup-time");
  if(tp) tp.addEventListener("change",()=>{
    const data=getCurrentDayData();
    data.kids[kid.id].pickupTime=tp.value;
    saveDayData(data); schedulePickupReminders(data);
  });
});

// Daily note
let noteTimer;
document.getElementById("daily-note").addEventListener("input",()=>{
  clearTimeout(noteTimer);
  noteTimer=setTimeout(()=>{
    const data=getCurrentDayData();
    data.dailyNote=document.getElementById("daily-note").value;
    data.noteUpdatedBy=userName||null;
    data.noteUpdatedAt=fmt(new Date());
    saveDayData(data); renderNoteMeta(data);
  },600);
});

function getCurrentDayData() {
  const key=getViewKey(viewDateOffset);
  return JSON.parse(JSON.stringify(dayCache[key]||emptyDayData()));
}
function saveDayData(data) {
  const key=getViewKey(viewDateOffset);
  dayCache[key]=data;
  syncDay(key, data);
}
function stampKid(data, id) {
  data.kids[id].updatedAt=fmt(new Date());
  data.kids[id].updatedBy=userName||null;
}

// ═══════════════════════════
// RENDER TODAY
// ═══════════════════════════
function renderToday(data) {
  if(!data) data=emptyDayData();
  KIDS_DEFAULT.forEach(k=>renderKid(k, data));

  const dn=document.getElementById("daily-note");
  if(dn.value!==(data.dailyNote||"")) dn.value=data.dailyNote||"";
  renderNoteMeta(data);

  const banner=document.getElementById("no-school-banner");
  const allNS=KIDS_DEFAULT.every(k=>data.kids[k.id]?.dayType==="noschool");
  banner.style.display=allNS?"block":"none";
  if(allNS) banner.textContent="🚫 No school today for all kids";
}

function renderKid(kid, data) {
  const s=data.kids[kid.id]||{};
  const st=STATUSES.find(x=>x.key===s.status);
  const kidSetting=settings.kids.find(k=>k.id===kid.id)||kid;

  const badge=document.getElementById(`badge-${kid.id}`);
  const sub=document.getElementById(`sub-${kid.id}`);
  if(st){
    badge.textContent=`${st.icon} ${st.label}`; badge.style.background=SB[s.status]; badge.style.color=SC[s.status];
    sub.textContent=`${st.icon} ${st.label}`; sub.style.color=SC[s.status];
  } else {
    badge.textContent="—"; badge.style.background=""; badge.style.color="";
    sub.textContent="No status yet"; sub.style.color="";
  }
  document.getElementById(`top-${kid.id}`).style.background=s.status?SB[s.status]+"55":"";
  document.getElementById(`meta-${kid.id}`).textContent=
    s.updatedAt?`Updated ${s.updatedAt}${s.updatedBy?" by "+s.updatedBy:""}`:"";

  // Avatar
  renderAvatarEl(document.getElementById(`avatar-${kid.id}`), kidSetting);

  document.querySelectorAll(`.chip[data-kid="${kid.id}"][data-status]`).forEach(b=>b.classList.toggle("active",b.dataset.status===s.status));
  document.querySelectorAll(`.chip[data-kid="${kid.id}"][data-pickup]`).forEach(b=>b.classList.toggle("active",b.dataset.pickup===s.pickup));
  document.querySelectorAll(`.chip[data-kid="${kid.id}"][data-daytype]`).forEach(b=>b.classList.toggle("active",b.dataset.daytype===s.dayType));

  document.getElementById(`don-${kid.id}`).classList.toggle("visible",s.status==="off");
  const donInp=document.getElementById(`don-inp-${kid.id}`);
  if(donInp.value!==(s.dayOffNote||"")) donInp.value=s.dayOffNote||"";

  const tp=document.querySelector(`.pickup-time[data-kid="${kid.id}"]`);
  const tr=document.getElementById(`tr-${kid.id}`);
  const pt=s.pickupTime||kidSetting.pickupTime||null;
  if(pt){ tp.style.display=""; if(tp.value!==pt) tp.value=pt;
    const[ph,pm]=pt.split(":").map(Number);
    const diff=(ph*60+pm)-(new Date().getHours()*60+new Date().getMinutes());
    tr.classList.toggle("soon",diff>=0&&diff<=30);
  } else { tp.style.display="none"; tr.classList.remove("soon"); }
}

function renderAvatarEl(el, kidSetting) {
  if(!el) return;
  if(kidSetting.iconImg) {
    el.innerHTML=`<img src="${kidSetting.iconImg}" alt="${kidSetting.name}"/>`;
  } else {
    el.innerHTML=kidSetting.icon||kidSetting.emoji||"🧒";
  }
}

function renderNoteMeta(data) {
  const m=document.getElementById("note-meta");
  m.textContent=data?.noteUpdatedAt?`Updated ${data.noteUpdatedAt}${data.noteUpdatedBy?" by "+data.noteUpdatedBy:""}`:"";
}

// ═══════════════════════════
// CALENDAR
// ═══════════════════════════
let calY=new Date().getFullYear(), calM=new Date().getMonth();
document.getElementById("cal-prev").onclick=()=>{calM--;if(calM<0){calM=11;calY--;}renderCalendar();};
document.getElementById("cal-next").onclick=()=>{calM++;if(calM>11){calM=0;calY++;}renderCalendar();};

function renderCalendar(){
  document.getElementById("cal-month-label").textContent=
    new Date(calY,calM,1).toLocaleDateString("en-US",{month:"long",year:"numeric"});
  document.getElementById("cal-dow-row").innerHTML=
    DOW.map((n,i)=>`<div class="cal-dow${i===6?" we":""}">${n}</div>`).join("");
  const daysEl=document.getElementById("cal-days"); daysEl.innerHTML="";
  const first=new Date(calY,calM,1).getDay();
  const dim=new Date(calY,calM+1,0).getDate();
  const td=new Date();

  for(let i=0;i<first;i++){
    const el=document.createElement("div"); el.className="cal-day om";
    el.innerHTML=`<span class="cdn">${new Date(calY,calM,-first+i+1).getDate()}</span>`;
    daysEl.appendChild(el);
  }
  for(let day=1;day<=dim;day++){
    const dk=`${calY}-${String(calM+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    const dd=historyData[dk];
    const dow=new Date(calY,calM,day).getDay();
    const kidWithDow = settings.kids.find(k=>k.schoolDays&&!k.schoolDays.includes(dow));
    const noSchoolDay = !!kidWithDow || (settings.kids.every(k=>k.schoolDays&&!k.schoolDays.includes(dow)));
    const isToday=calY===td.getFullYear()&&calM===td.getMonth()&&day===td.getDate();

    const el=document.createElement("div");
    el.className=`cal-day${isToday?" today":""}${noSchoolDay?" noschoolday":""}`;

    let capsulesHtml="";
    let tagHtml="";
    if(dd?.kids){
      const anyNS=KIDS_DEFAULT.some(k=>dd.kids[k.id]?.dayType==="noschool");
      const anyHD=KIDS_DEFAULT.some(k=>dd.kids[k.id]?.dayType==="halfday");
      if(anyNS) tagHtml=`<div class="cal-day-tag">No School</div>`;
      else if(anyHD) tagHtml=`<div class="cal-day-tag">½ Day</div>`;

      capsulesHtml=`<div class="cal-capsules">`+KIDS_DEFAULT.map(k=>{
        const ks=dd.kids[k.id];
        if(!ks?.status) return "";
        const st=STATUSES.find(x=>x.key===ks.status);
        if(!st) return "";
        const kidSetting=settings.kids.find(x=>x.id===k.id)||k;
        const avatarHtml=kidSetting.iconImg
          ?`<div class="cal-capsule-avatar"><img src="${kidSetting.iconImg}"/></div>`
          :`<div class="cal-capsule-avatar" style="background:${SB[ks.status]}">${kidSetting.icon||k.icon}</div>`;
        return `<div class="cal-capsule" style="background:${SB[ks.status]};color:${SC[ks.status]}">`+
          `<div class="cal-capsule-left">${avatarHtml}<span>${k.name.slice(0,4)}</span></div>`+
          `<span>${st.icon}</span>`+
          `</div>`;
      }).join("")+`</div>`;
    }
    el.innerHTML=`<span class="cdn">${day}</span>${capsulesHtml}${tagHtml}`;
    el.addEventListener("click",()=>showCalDetail(dk));
    daysEl.appendChild(el);
  }
  const total=first+dim;
  const rem=total%7===0?0:7-(total%7);
  for(let i=1;i<=rem;i++){
    const el=document.createElement("div"); el.className="cal-day om";
    el.innerHTML=`<span class="cdn">${i}</span>`; daysEl.appendChild(el);
  }
}

function showCalDetail(dk){
  const detail=document.getElementById("cal-detail");
  const title=document.getElementById("cal-detail-title");
  const body=document.getElementById("cal-detail-body");
  const data=historyData[dk];
  title.textContent=new Date(dk+"T00:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
  detail.classList.add("visible");
  if(!data?.kids){body.innerHTML=`<div style="color:var(--muted);font-size:.82rem;padding:6px 0">No data for this day.</div>`;return;}
  body.innerHTML=KIDS_DEFAULT.map(k=>{
    const ks=data.kids[k.id]; if(!ks) return "";
    const st=STATUSES.find(x=>x.key===ks.status);
    const kidSetting=settings.kids.find(x=>x.id===k.id)||k;
    const avatarHtml=kidSetting.iconImg
      ?`<div class="cal-detail-avatar"><img src="${kidSetting.iconImg}"/></div>`
      :`<div class="cal-detail-avatar">${kidSetting.icon||k.icon}</div>`;
    const stB=st?`<span class="mbadge" style="background:${SB[ks.status]};color:${SC[ks.status]}">${st.icon} ${st.label}</span>`
      :`<span class="mbadge" style="background:#f1f5f9;color:var(--muted)">—</span>`;
    const pB=ks.pickup?`<span class="mbadge" style="background:#f1f5f9;color:var(--muted)">${ks.pickup==="abba"?"👨 Abba":"👩 Ima"}</span>`:"";
    const dtB=ks.dayType?`<span class="mbadge" style="background:#fff7ed;color:#c2410c">${ks.dayType==="noschool"?"🚫 No School":"🌤️ Half Day"}</span>`:"";
    return `<div class="cal-detail-kid">${avatarHtml}<div class="cal-dn">${k.name}</div><div class="cal-badges">${stB}${pB}${dtB}</div></div>`;
  }).join("")+(data.dailyNote?`<div style="margin-top:10px;padding:8px;background:#f8fafc;border-radius:8px;font-size:.78rem;font-weight:600">📝 ${data.dailyNote}</div>`:"");
}

// SETTINGS MODAL
// ═══════════════════════════
// Track temp icon selections
let tempIcons = {};

function openSettings(){
  document.getElementById("s-username").value=userName||"";

  // Build per-kid sections
  const container=document.getElementById("per-kid-sections");
  container.innerHTML="";
  KIDS_DEFAULT.forEach(kid=>{
    const ks=settings.kids.find(k=>k.id===kid.id)||kid;
    tempIcons[kid.id] = {icon: ks.icon||kid.icon, iconImg: ks.iconImg||null};

    const sec=document.createElement("div");
    sec.className="ssection";
    sec.innerHTML=`
      <div class="ssection-title">${ks.icon||kid.icon} ${kid.name}'s Settings</div>
      <div class="srow">
        <div><div class="slbl">School Days</div><div class="ssub">Days ${kid.name} goes to school</div></div>
        <div class="sctl"><div class="dow-picker" id="dow-${kid.id}"></div></div>
      </div>
      <div class="srow">
        <div><div class="slbl">School End Time</div><div class="ssub">Regular end time</div></div>
        <div class="sctl"><input type="time" id="set-end-${kid.id}" value="${ks.endTime||'14:00'}"/></div>
      </div>
      <div class="srow">
        <div><div class="slbl">Half Day End Time</div><div class="ssub">End time on half days</div></div>
        <div class="sctl"><input type="time" id="set-hd-${kid.id}" value="${ks.halfdayTime||'12:00'}"/></div>
      </div>
      <div class="srow">
        <div><div class="slbl">Default Pickup Time</div></div>
        <div class="sctl"><input type="time" id="set-pt-${kid.id}" value="${ks.pickupTime||''}"/></div>
      </div>
      <div class="srow" style="flex-direction:column;align-items:flex-start;gap:8px">
        <div><div class="slbl">Icon / Photo</div><div class="ssub">Choose an emoji or upload a photo</div></div>
        <div class="icon-picker" id="icon-picker-${kid.id}"></div>
        <label class="upload-btn">
          📷 Upload photo
          <input type="file" accept="image/*" style="display:none" onchange="handleIconUpload(event,'${kid.id}')"/>
        </label>
        <div id="icon-preview-${kid.id}" style="margin-top:4px"></div>
      </div>`;
    container.appendChild(sec);

    // DOW picker
    const dowPicker=document.getElementById(`dow-${kid.id}`);
    const schoolDays = ks.schoolDays||[0,1,2,3,4,5];
    dowPicker.innerHTML=DOW.map((n,i)=>
      `<div class="dow-chip${schoolDays.includes(i)?" active":""}" data-kid="${kid.id}" data-dow="${i}">${n}</div>`
    ).join("");
    dowPicker.querySelectorAll(".dow-chip").forEach(c=>c.addEventListener("click",()=>{
      const dw=parseInt(c.dataset.dow);
      const ks2=settings.kids.find(k=>k.id===c.dataset.kid);
      if(!ks2.schoolDays) ks2.schoolDays=[0,1,2,3,4,5];
      const idx=ks2.schoolDays.indexOf(dw);
      if(idx>-1) ks2.schoolDays.splice(idx,1); else ks2.schoolDays.push(dw);
      ks2.schoolDays.sort();
      c.classList.toggle("active",ks2.schoolDays.includes(dw));
    }));

    // Icon picker
    const iconPicker=document.getElementById(`icon-picker-${kid.id}`);
    ICON_OPTIONS.forEach(ic=>{
      const opt=document.createElement("div");
      opt.className="icon-opt"+(tempIcons[kid.id].icon===ic&&!tempIcons[kid.id].iconImg?" selected":"");
      opt.textContent=ic;
      opt.addEventListener("click",()=>{
        tempIcons[kid.id]={icon:ic,iconImg:null};
        iconPicker.querySelectorAll(".icon-opt").forEach(o=>o.classList.remove("selected"));
        opt.classList.add("selected");
        document.getElementById(`icon-preview-${kid.id}`).innerHTML="";
      });
      iconPicker.appendChild(opt);
    });

    // If has uploaded image, show preview
    if(ks.iconImg){
      document.getElementById(`icon-preview-${kid.id}`).innerHTML=
        `<img src="${ks.iconImg}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--school)"/>`;
    }
  });

  // Notification button
  const nb=document.getElementById("notif-btn");
  if(!("Notification" in window)) nb.textContent="Not supported";
  else if(Notification.permission==="granted") nb.textContent="✅ Enabled";
  else if(Notification.permission==="denied") nb.textContent="❌ Blocked in browser";
  else nb.textContent="Enable";

  document.getElementById("settings-modal").classList.add("visible");
}

function handleIconUpload(event, kidId){
  const file=event.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const dataUrl=e.target.result;
    tempIcons[kidId]={icon:null,iconImg:dataUrl};
    // Clear emoji selections
    document.querySelectorAll(`#icon-picker-${kidId} .icon-opt`).forEach(o=>o.classList.remove("selected"));
    document.getElementById(`icon-preview-${kidId}`).innerHTML=
      `<img src="${dataUrl}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--school)"/>`;
  };
  reader.readAsDataURL(file);
}

function closeSettings(){
  document.getElementById("settings-modal").classList.remove("visible");
}
function handleModalBg(e){
  if(e.target===document.getElementById("settings-modal")) closeSettings();
}

function saveSettings(){
  userName=document.getElementById("s-username").value.trim();
  localStorage.setItem("kt_local",JSON.stringify({userName}));

  KIDS_DEFAULT.forEach(kid=>{
    const ks=settings.kids.find(k=>k.id===kid.id)||kid;
    ks.endTime=document.getElementById(`set-end-${kid.id}`).value;
    ks.halfdayTime=document.getElementById(`set-hd-${kid.id}`).value;
    ks.pickupTime=document.getElementById(`set-pt-${kid.id}`).value||null;
    if(tempIcons[kid.id]){
      ks.icon=tempIcons[kid.id].icon||kid.icon;
      ks.iconImg=tempIcons[kid.id].iconImg||null;
    }
  });

  // Save settings to Firebase — but strip large image data to keep it small
  const settingsForFirebase = {
    kids: settings.kids.map(k=>({...k, iconImg:undefined}))
  };
  if(window._fbSet) window._fbSet(DB_SET, settingsForFirebase);

  // Save icon images locally
  const localIcons={};
  settings.kids.forEach(k=>{ if(k.iconImg) localIcons[k.id]=k.iconImg; });
  localStorage.setItem("kt_icons",JSON.stringify(localIcons));

  closeSettings();
  // Re-render with new settings
  renderToday(dayCache[getViewKey(viewDateOffset)]||emptyDayData());
  schedulePickupReminders(dayCache[getViewKey(viewDateOffset)]||emptyDayData());

  const btn=document.querySelector(".save-btn");
  btn.textContent="✅ Saved!";
  setTimeout(()=>btn.textContent="💾 Save Settings",1800);
}

function resetToday(){
  if(!confirm("Reset all statuses for this day?")) return;
  saveDayData(emptyDayData());
  renderToday(emptyDayData());
  closeSettings();
}

// Load local icons on startup
(()=>{
  try {
    const localIcons=JSON.parse(localStorage.getItem("kt_icons")||"{}");
    settings.kids.forEach(k=>{ if(localIcons[k.id]) k.iconImg=localIcons[k.id]; });
  } catch(e){}
})();

// ═══════════════════════════
// NOTIFICATIONS
// ═══════════════════════════
let notifTimers=[];
async function requestNotifications(){
  if(!("Notification" in window)){alert("Notifications not supported.");return;}
  const perm=await Notification.requestPermission();
  document.getElementById("notif-btn").textContent=perm==="granted"?"✅ Enabled":"❌ Blocked in browser";
  if(perm==="granted") schedulePickupReminders(dayCache[getViewKey(viewDateOffset)]||emptyDayData());
}

function schedulePickupReminders(data){
  notifTimers.forEach(t=>clearTimeout(t)); notifTimers=[];
  if(!("Notification" in window)||Notification.permission!=="granted") return;
  KIDS_DEFAULT.forEach(kid=>{
    const ks=data?.kids[kid.id]||{};
    const kidSetting=settings.kids.find(k=>k.id===kid.id)||kid;
    const pt=ks.pickupTime||kidSetting.pickupTime;
    if(!pt) return;
    const[ph,pm]=pt.split(":").map(Number);
    const reminderTime=new Date(); reminderTime.setHours(ph,pm-15,0,0);
    const ms=reminderTime.getTime()-Date.now();
    if(ms>0){
      notifTimers.push(setTimeout(()=>{
        new Notification("🚗 Pickup Reminder",{
          body:`${kid.name}'s pickup is in 15 minutes (${pt})`,
          icon:"https://raw.githubusercontent.com/twitter/twemoji/master/assets/72x72/1f9d2.png"
        });
      },ms));
    }
  });
}

// ═══════════════════════════
// PAGE NAV
// ═══════════════════════════
function showPage(name){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".nav-tab").forEach(b=>b.classList.remove("active"));
  document.getElementById(`page-${name}`).classList.add("active");
  document.getElementById(`nav-${name}`)?.classList.add("active");
  document.getElementById("date-bar-wrap").style.display=name==="today"?"block":"none";
  if(name==="calendar") renderCalendar();
}

// HELPERS
// ═══════════════════════════
function fmt(d){return d.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});}
setInterval(()=>{
  const data=dayCache[getViewKey(viewDateOffset)];
  if(data) KIDS_DEFAULT.forEach(k=>renderKid(k,data));
},60000);

updateDateBar();
renderToday(emptyDayData());
</script>
